name: lightweight-tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pytest

      - name: Run unit tests
        run: pytest tests/

      - name: Run demo pipeline
        run: python run_pipeline.py --mode demo --config configs/experiment_main.yaml

      - name: Check full pipeline commands
        run: python run_pipeline.py --mode full --config configs/main.yaml --dry-run

      - name: Check top-level reviewer entrypoints
        run: |
          python run_pipeline.py --mode full --config configs/main.yaml --dry-run
          python scripts/evaluate_all.py --config configs/main.yaml --dry-run
          python scripts/reproduce_figures.py --config configs/main.yaml --dry-run

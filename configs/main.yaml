data:
  raw_path: data/raw/S1.raw
  raw_shape: [800, 800, 800]
  patch_size: 256
  stride: 32
  real_samples_per_target: 100

training:
  device: cuda
  n_samples: 1000
  batch_vae: 1
  batch_ddpm: 1
  epochs_vae: 80
  epochs_ddpm: 150

generation:
  targets: [0.11, 0.12, 0.13, 0.14, 0.15]
  n_per_target: 100
  seed_start: 0

model:
  downsample_factor: 4
  embedding_dim: 32
  num_embeddings: 1024
  n_steps: 1000
  poro_center: 0.13
  poro_scale: 0.02

evaluation:
  r_max: 128

paths:
  checkpoint_dir: outputs/main_sandstone
  real_root: data/real256_sets_from_S1_strict
  generated_root: data/generated_phi_sets
  results_root: results
  curve_results: results/fig_s2
  table_results: results/tables
  topology_results: results/fig_pnm

demo:
  summary_root: examples
